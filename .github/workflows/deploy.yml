name: Deploy site to GitHub Pages

# Deploys the static site to GitHub Pages on every push to `main`,
# and can also be triggered manually from the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Enables GitHub Pages (build type "GitHub Actions") on first run,
      # so you don't have to flip the source setting manually.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Publish only the site files — exclude dev-only tooling and VCS data.
      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            --exclude='scripts' \
            --exclude='configure.sh' \
            --exclude='README.md' \
            --exclude='docs' \
            --exclude='assets/brand-v1' \
            ./ _site/

      # Stamp every deploy with the commit SHA: write it to build.txt (which the
      # client polls to detect a new release and auto-refresh), inject it as a
      # <meta name="app-build"> on each page, and append it as a ?v= query to
      # local asset URLs so CSS/JS/media bust their cache on every release.
      - name: Stamp build version (cache-busting)
        run: |
          BUILD="${GITHUB_SHA::8}"
          printf '%s' "$BUILD" > _site/build.txt
          find _site -name '*.html' -print0 | xargs -0 sed -E -i \
            -e "s#</head>#<meta name=\"app-build\" content=\"$BUILD\"></head>#" \
            -e "s#(src|href|poster)=\"(assets/[^\"?]+)\"#\1=\"\2?v=$BUILD\"#g"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
